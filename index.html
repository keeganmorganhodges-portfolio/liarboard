<body>

  <!-- ── NAVBAR (always visible) ──────────────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <a href="#/" class="nav-logo" aria-label="LiarBoard home">
      <img src="https://wrtzeypczqoqnzgqiksx.supabase.co/storage/v1/object/public/IMAGES/anon.jpeg" alt="LiarBoard">
      <span>LiarBoard</span>

    <div class="nav-links">
      <a href="#/board" class="nav-link">The Board</a>

    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">☰</button>
  </nav>

  <!-- Mobile nav drawer -->
  <div class="nav-drawer" id="navDrawer">
    <a href="#/board" class="drawer-link">The Board</a>
    <a href="#/docs" class="drawer-link">Docs</a>
    <a href="#/contact" class="drawer-link">Contact</a>
  </div>

  <!-- ── BREADCRUMB BAR (shown on board + category + person pages) ────────── -->
  <div class="breadcrumb-bar" id="breadcrumbBar" aria-label="Breadcrumb"></div>

  <!-- ── MAIN SPA VIEWPORT ────────────────────────────────────────────────── -->
  <main id="app"></main>

  <!-- ── PAGE TEMPLATES (hidden, cloned by router) ────────────────────────── -->

  <!-- LANDING PAGE -->
  <template id="tpl-landing">
    <section class="landing">
      <div class="landing-hero">
        <div class="landing-badge">FACT-CHECKED DATABASE</div>
        <h1 class="landing-title">The Board <br>Doesn't Lie.</h1>
        <p class="landing-sub">Public figures say a lot. We track what's actually true.</p>
        <p class="landing-desc">LiarBoard is a visual database where every claim is held against the light. When the truth is hidden, we put it back on the Board.</p>
        <button class="cta-btn" id="ctaReveal">
          <span>Reveal the Truth</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div class="landing-stats" id="landingStats">
        <div class="stat-card"><span class="stat-num" id="statTotal">—</span><span class="stat-label">Entries</span></div>
        <div class="stat-card"><span class="stat-num" id="statDebunked">—</span><span class="stat-label">Claims on Record</span></div>
        <div class="stat-card"><span class="stat-num" id="statClasses">7</span><span class="stat-label">Categories</span></div>
      </div>
      <div class="landing-features">
        <div class="feature-card">
          <div class="feature-icon">⚡</div>
          <h3>Claims Tracked</h3>
          <p>Every public statement verified against reality. The Claim vs. The Truth, side by side.</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔗</div>
          <h3>Source-Backed</h3>
          <p>Every truth comes with linked sources. No anonymous accusations — just cited facts.</p>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📂</div>
          <h3>Categorized</h3>
          <p>Browse by category: Politicians, CEOs, Media figures, and more.</p>
        </div>
      </div>
    </section>
  </template>

  <!-- BOARD (category picker) -->
  <template id="tpl-board">
    <section class="board-page">
      <header class="page-header">
        <h1>Choose a Category</h1>
        <p>Select a category to browse entries. Each category is loaded and cached independently.</p>
      </header>
      <div class="category-grid" id="categoryGrid">
        <!-- Injected by router -->
      </div>
    </section>
  </template>

  <!-- CATEGORY LIST PAGE -->
  <template id="tpl-category">
    <section class="category-page">
      <header class="page-header">
        <h1 id="catPageTitle"></h1>
        <div class="cat-toolbar">
          <input type="text" id="catSearch" placeholder="Search by name…" aria-label="Search">
          <select id="catSort" aria-label="Sort order">
            <option value="newest">Newest Added</option>
            <option value="oldest">Oldest Added</option>
            <option value="lvlHigh">Highest Level</option>
            <option value="lvlLow">Lowest Level</option>
            <option value="mostDebunked">Most Debunked</option>
            <option value="recentCorrect">Recently Corrected</option>
          </select>
        </div>
      </header>
      <div class="people-list" id="peopleList"></div>
      <div id="loadMoreWrapper" style="text-align:center;padding:30px 0;display:none">
        <button class="load-more-btn" id="loadMoreBtn">Load More</button>
      </div>
    </section>
  </template>

  <!-- PERSON DETAIL PAGE -->
  <template id="tpl-person">
    <article class="person-page" id="personPage">
      <!-- Injected by router -->
    </article>
  </template>

  <!-- DOCS PAGE -->
  <template id="tpl-docs">
    <section class="docs-page">
      <h1 class="page-title">Documentation</h1>
      <p class="page-subtitle">Terms of Service, Privacy Policy, Roadmap and instructions for LiarBoard.</p>

      <details class="doc-section" open>
        <summary>How to Use</summary>
        <div class="doc-content">
          <p><strong>Browsing:</strong> From the Board, pick a category. Each category page shows all entries in that class. Click any entry to see full details — the claim, the verified truth, and all sources.</p>
          <p><strong>Sorting &amp; Searching:</strong> Use the search bar or sort options on any category page to narrow results. "Most Debunked" surfaces the most active fact-check entries.</p>
          <p><strong>Submission Requests:</strong> Use the Contact page to generate a formatted request. Copy and email it to our admin at <strong>liarboard.buisness@gmail.com</strong>. Removals must include who you are, your relation to the subject, your reason, jurisdiction, and what authority you have, if any, to make such a request.</p>
          <p><strong>Note:</strong> All entries are reviewed manually and then placed into a massive research queue where we find out everything about them during their entire life. Changes can take time. Donors get priority with placing in the queue. Donors do not, however, get reduced research time taken for each person, as revealing the absolute and definite truth is placed at the highest standard. Data is reviewed carefully, slowly, and methodically being rechecked at least 10 times.</p>
        </div>
      </details>

      <details class="doc-section">
        <summary>Privacy &amp; Terms</summary>
        <div class="doc-content">
          <p><strong>Privacy Policy:</strong> LiarBoard does not store your personal data, cookies or IP for marketing or any other reason. Unless explicity stated for something unique, no user information whatsoever will be stored or viewable by anyone at LiarBoard. This does not cover individual affiliate sites or entities. Your public IP is tracked by our backend live (not stored) on Cloudflare's network (not viewable by anyone at LiarBoard), solely to enforce rate limits, protect our resources, and most importantly to ensure the experience of our legitimate visitors/user's is safe, private, secure, comfortable, facilitating, reliable, and accurately informative. We only store the public profile entry data visible to user's on the Board: names, bios, images, claims, truths, and sources. Removal requests and Add Requests are processed off site manually through email. During Email interactions, email providers or other entities, may have their own policies/handling that may differ from the way we like to do things, however, this is standard when sending and recieving email.</p>
          <p><strong>Terms of Service:</strong> By using this site you agree not to submit entries with the intent to harass. Instead, the purpose of the entry data is to simply make sure people know what the truth is. All entries you request will either be added or removed with the methodical care we set as the highest standard for all our Board entries. LiarBoard and affiliated entities are hereby voided from responsibility — legal, moral, ethical or otherwise. All entries must serve the purpose of public honesty, and not harassment. If an add request is submitted and we cannot find public incorrect claims made by them, or enough information/sources to support that information, we may not add them. We reserve the right to deny or remove any entry at our discretion. If a removal request is submitted by an entity with no authority or jurisdiction to initiate a requirement to remove, we may not remove the person from the database if we believe the person in question still has outstanding false claims that enough people are not aware of. If there is not legal authority for the request, we may still remove it though if we believe enough people are aware of the truth, and the data be retained is effecting the person in questions safety or otherwise to an unnecessary extent. We do have morals, we know that people make mistakes, and we understand that some people may even make a false claim unintentionally, therefore the purpose of information provided is not to harass or draw conclusions about a person, but simply to provide people with the undeniable and unbiased facts. And finally, if a removal request is submitted by a party containing or invoking legal credentials or ramifications, or any other request is made by such an entity, we are void from any legal penalties and do not wish to have such issues, so please just contact us and we will do our absolute best to accommodate any request you have, and make sure that you are provided with any information that you may need. We do not wish to face any legal issues, so please allow us to resolve any issues your legal entitiy/party may have without penalty to LiarBoard.</p>
        </div>
      </details>

      <details class="doc-section">
        <summary>Roadmap</summary>
        <div class="doc-content">
          <p>✅ Phase 1: Initial Board Launch</p>
          <p>✅ Phase 2: Image Carousel</p>
          <p>✅ Phase 3: Claim vs. Truth Toggle with Sources</p>
          <p>✅ Phase 4: Most Debunked / Recently Corrected Filters</p>
          <p>✅ Phase 5: SPA with Category Pages &amp; Person Detail Pages</p>
          <p>🔜 Phase 6: Full overall stat page of all different types of LiarBoard stats</p>
          <p>🔜 Phase 7: System Upgrades</p>
          <p>🔜 Phase 8: Backend Optimizations</p>
          <p>🔜 Phase 9: General Improvements</p>
          <p>🔜 Phase 10: Massive Upgrades | included improvements/upgrades to be revealed closer to release time.</p>
        </div>
      </details>

      <details class="doc-section">
        <summary>Support the Project</summary>
        <div class="doc-content">
          <p>Keeping LiarBoard running takes time and resources. If you find it useful, helpful, or enjoy it, consider donating, as we have very little resources for us to work with. We don't even have a built-in donation system yet — please email the admin to arrange it. Sharing the site is also a great way to help. Make sure to tell people about us, please! (:</p>
        </div>
      </details>
    </section>
  </template>

  <!-- CONTACT PAGE -->
  <template id="tpl-contact">
    <section class="contact-page">
      <h1 class="page-title">Contribute to the Board</h1>
      <p class="page-subtitle">Request adding or removing people from LiarBoard. Or email us directly at <strong>liarboard.buisness@gmail.com</strong>. You can email us using this email for any questions you have, etc, or otherwise. Do not hesitate to contact us for anything! We value our users and think of them more than just users. Users to us are more like guests or just people in our homes, therefore we will treat you as such, and to our best to help you with whatever you may need help with.</p>

      <details class="doc-section" open>
        <summary>Request New People To Add</summary>
        <div class="doc-content">
          <p>Enter full names of the people to request they be added. Max 50 characters each.</p>
          <div id="addListContainer">
            <div class="name-entry"><input type="text" placeholder="First and last name and, if necessary, provide middle" class="name-input" maxlength="50"></div>
          </div>
          <div class="btn-row">
            <button type="button" class="btn-outline" onclick="LB.contact.addInput('addListContainer')">+ Add Another</button>
            <button type="button" class="btn-green" onclick="LB.contact.generateList('ADD')">Generate Add Request</button>
          </div>
        </div>
      </details>

      <details class="doc-section">
        <summary>Request Person Removal</summary>
        <div class="doc-content">
          <p>Enter names to request removal from the Board.</p>
          <div id="removeListContainer">
            <div class="name-entry"><input type="text" placeholder="Full Name" class="name-input" maxlength="50"></div>
          </div>
          <div class="btn-row">
            <button type="button" class="btn-outline" onclick="LB.contact.addInput('removeListContainer')">+ Add Another</button>
            <button type="button" class="btn-red" onclick="LB.contact.generateList('REMOVE')">Generate Removal Request</button>
          </div>
        </div>
      </details>

      <div id="contactResult" style="display:none;margin-top:24px">
        <p>Copy this and email to: <strong>liarboard.buisness@gmail.com</strong></p>
        <textarea id="contactOutput" readonly class="output-box"></textarea>
        <button type="button" class="btn-outline" id="copyResultBtn" style="margin-top:12px">Copy to Clipboard</button>
      </div>
    </section>
  </template>

  <!-- 404 PAGE -->
  <template id="tpl-404">
    <section class="not-found">
      <h1>404</h1>
      <p>This page doesn't exist on the Board or there's been an error. If you believe there's been a mistake, please contact us.</p>
      <a href="#/" class="btn-primary">← Back to Home</a>
    </section>
  </template>

  <script src="/js/app.js"></script>
</body>
