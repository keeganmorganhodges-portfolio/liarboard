  <!-- DOCS PAGE -->
  <template id="tpl-docs">
    <section class="docs-page">
      <h1 class="page-title">Documentation</h1>
      <p class="page-subtitle">Terms of Service, Privacy Policy, Roadmap, instructions, and other information for LiarBoard.</p>

      <details class="doc-section">
        <summary>Important Note</summary>
        <div class="doc-content">
          <p><strong>Current Status:</strong> LiarBoard is extremely new, currently in active development and is beta. Right now, there are not many entries on the Board | this will change soon. We are currently running on extremely limited resources. Although not likely, LiarBoard and it's resources could become unavailable at any time for any reason. If the site and/or it's resources become inactive please be understanding and know that we are working hard to fix it. During to the nature of our current development, information may be subject to change with/or without notification. Because we are extremely new and don't have loads of money and resources like large established sites or companies, any support you give us is invaluable. You can contact us any time at liarboard.buisness@gmail.com. If you have any suggestions, recommendations, reviews or any feedback please email us, it helps so much. While we are currently extremely small, we have plans to eventually track claims and truths of nearly every public figure and be a widely-known, reliable and accurate source of truth. You can also donate if you want to, and any amount would be super helpful to us. 
          <strong>Regards to public honesty:</strong>
          We don't track personal info. We, LiarBoard, also don't track users/visitors personal or public info. We believe everyone has a right to privacy/anonymity, but when making the decision to lie to large groups of people/public then that must be addressed. And so, anything a public figure says to the public that is false, is grounds to be added to the site. You can be private and even anonymous, or you can be public, there is really no in between.
          </p>
        </div>
      </details>

      <details class="doc-section">
        <summary>Policies and Standards</summary>
        <div class="doc-content">
          <p><strong>10Check Policy:</strong>
          Some people double check things, or triple check - some just don't even recheck. We at LiarBoard, however, are extremely methodical, precise, and above all, committed to always providing the absolute, unquestionable truth that is 100% accurate down to the finest detail. One of the many policies we follow to ensure these standards are met is our 10Check Policy. Henceforth, anywhere we, LiarBoard, specifically mention 10Check Policy was used during the creation, deletion, modification/alteration, and/or any other actions taken for any type of data/service, - is defined, unless otherwise stated, simply as a policy/standard to ensure accuracy by re-checking and re-verifying something a minimum of 10 times to ensure accuracy. Even if 10Check is not explicitly stated for something, we still verify and check everything that we post multiple times, and 10Check still could have been used even if not mentioned. 
          </p>

          <p><strong>Board Research Process:</strong>
          The Board Research Queue covers every one already in the database, as well as people that are being prepared to add. Anyone added to the Board Research Queue stays in it to continue being updated and added to over time. When researching, we gather up a large amount of public information regarding each person. We cross-reference a minimum of 5 reputable sources. Every little bit of information we gather, as well as all sources, etc, is 10Checked individually. This information is then organized by date, formatted, and then written up into a report that is then added to our database. You can then see a large list of false claims/lies each person has made that we have currently documented, along with the truth with more info being added to each person as we continue to audit people.</p>
        </div>
      </details>
      
      <details class="doc-section">
        <summary>How to Use</summary>
        <div class="doc-content">
          <p><strong>Browsing:</strong> From the Board, pick a category. Each category page shows all entries of people in that category. Click any entry to see full details - the claim, the verified truth, and all sources.</p>
          <p><strong>Sorting &amp; Searching:</strong> Use the search bar or sort options on any category page to narrow results. "Most Debunked" surfaces the most active fact-check entries.</p>
          <p><strong>Submission Requests:</strong> Use the Contact page to generate a formatted request to add or remove a person from the Board. Copy and email it to our admin at <strong>liarboard.buisness@gmail.com</strong>. Removals must include who you are, your relation to the subject, your reason, jurisdiction, and what authority you have, if any, to make such a request.</p>
          <p><strong>Note:</strong> All entries are reviewed manually and go through a rigourous researched process outlined in our Policies and Standards. Changes takes lots of time. Donors get priority placing for request reviews. Donors do not, however, get reduced research time taken for each person, as revealing the absolute and definite truth to the Board and all users is always placed at the highest standard and that standard cannot be reduced with money. Board Entry Data is reviewed carefully, and methodically, as well as 10Checked.</p>
        </div>
      </details>
      <details class="doc-section">
        <summary>Privacy &amp; Terms</summary>
        <div class="doc-content">
          <p><strong>Privacy Policy:</strong><br> LiarBoard does not store your personal data, cookies or IP for marketing or any other reason. Unless explicity stated for something unique, no user information whatsoever will be stored or viewable by anyone at LiarBoard. This does not cover individual affiliate sites or entities. Your public IP is tracked by our backend live (not stored) on Cloudflare's network (not viewable by anyone at LiarBoard), solely to enforce rate limits, protect our resources, and most importantly to ensure the experience of our legitimate visitors/user's is safe, private, secure, comfortable, facilitating, reliable, and accurately informative. We only store the public profile entry data visible to user's on the Board: names, bios, images, claims, truths, and sources. Removal requests and Add Requests are processed off site manually through email. During Email interactions, email providers or other entities, may have their own policies/handling that may differ from the way we like to do things, however, this is standard when sending and recieving email.</p><br>
          <p><strong>Terms of Service:</strong><br> By using this site, you agree to all Terms of Service set by us, LiarBoard. By using this site you also agree not to request entries with the intent to harass. Instead, the purpose of this site is simply to make sure people know what the truth is. All entries you request to be added or removed will be either approved or denied at our discretion. LiarBoard and affiliated entities are hereby voided from responsibility or penalty - legal, moral, ethical or otherwise. All entries serve the purpose of public honesty, and not harassment. We reserve the right to deny or remove any entry at our discretion.</p><br>
          <p>
          <strong>No Legal Authority:</strong><br>
          If a removal request is submitted by an entity or party with no legal authority or jurisdiction to initiate a requirement to remove, we may not remove the person or person's from the database if we believe the person or person's requested to be removed still has outstanding false claims that enough people are not aware of, or if we believe the request was submitted out of bias, negligence, ignorance, etc. If there is not legal authority for the request, we may still remove it out of respect though depending on if these factors are met: if we believe enough people are aware of the truth, the person did not make the false claim out of malice or with intent to harm, is in overall good standing as a public figure, and the data being retained is unnecessarily effecting the person or person's and/or there family's well being, safety, and/or livelyhood to an unnecessary extent. We do have morals, we know that everyone makes mistakes, and we understand that some people may even make a false claim unintentionally, therefore the purpose of information provided is not to harass or draw conclusions about a person, but simply to provide people with the undeniable and unbiased facts so that they do not believe something that is incorrect. We believe that making claims publicly i.e. to a large group of people does carry more weight though and an attempt, at least, should be made by the public individual to check the accuracy of what they're saying, and if they realize they made a false claim they should own it and just tell people they messed up, which is completely normal and it would be abnormal if someone didn't make mistakes. This is why they're must be a valid reason to remove someone from the Board.
          </p><br>
          <p>
          <strong>Entities/Parties holding Legal authority and jurisdiction:</strong><br>
           If a removal request or any other request is made by an entity/party containing/invoking legal credentials, authority, and/or threatening Legal ramifications, we are void from any legal penalties and/or any court-ordered penalty and do not wish to have such issues. If you are an entity/party with authority please just contact our administration at liarboard.buisness@gmail.com and we will do our absolute best to accommodate and take immediate action on any request you have, and make sure that you are provided with any information or resources that you may need. As stated before, our goal is not to harass or otherwise, but simply to speak the truth, nothing else. We do not wish to cause any legal issues, so please allow us to resolve any issues you may have without ramification to LiarBoard. You do not have to invoke any legal penalties on us, we conform to all applicable law and regulations, and if you, a legal entity or a party bearing a legal entity need us to make any changes just tell us and we will.</p>
        </div>
      </details>

      <details class="doc-section">

      <details class="doc-section">
        <summary>Support the Project</summary>
        <div class="doc-content">
          <p>Keeping LiarBoard running takes time, money, and resources. If you find it useful, helpful, enjoy it, or would like to help reveal more truth to more users, consider donating, as we have very little resources to work with. We don't even have a built-in payment system yet - please email the admin to arrange donations, we apologize for this inconvenience and are working hard to fix it. Sharing the site is also a great way to help. Make sure to tell people about us, please! (:</p>

  <!-- CONTACT PAGE -->

            <button type="button" class="btn-outline" onclick="LB.contact.addInput('removeListContainer')">+ Add Another</button>
